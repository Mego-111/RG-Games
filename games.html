<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>RG - الألعاب</title>
</head>
<body>
    <nav>
        <button class="hamburger" onclick="document.getElementById('dropdown').classList.toggle('open')">☰</button>
        <div class="search-wrap">
            <input type="text" placeholder="ابحث عن لعبة...">
        </div>
        <div class="logo">RG</div>
    </nav>
    <div class="filters">
        <button class="filter-btn active" data-genre="">الكل</button>
        <button class="filter-btn" data-genre="4">أكشن</button>
        <button class="filter-btn" data-genre="5">RPG</button>
        <button class="filter-btn" data-genre="2">شوتر</button>
        <button class="filter-btn" data-genre="3">مغامرات</button>
        <button class="filter-btn" data-genre="7">لغز</button>
        <button class="filter-btn" data-genre="1">سباقات</button>
    </div>
    <div class="section">
        <div class="section-header">
            <h2 class="section-title">كل الألعاب</h2>
        </div>
        <div class="games-grid" id="games-grid"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
